<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sample Attendee Badges</title>
<style>
  body{background:#142430;color:#fff5eb;font-family:system-ui,sans-serif;text-align:center;margin:0;padding:30px}
  h1{color:#a8f0f4;margin:0 0 6px}
  .sub{color:#6b8a99;margin:0 0 28px}
  .row{display:flex;flex-wrap:wrap;gap:28px;justify-content:center}
  .card{background:#1a2e3b;border:1px solid #2d4a5a;border-radius:14px;padding:20px}
  img{width:300px;height:300px;background:#fff;border-radius:10px;display:block}
  p{margin:12px 0 0;color:#fff5eb}
  .email{color:#6b8a99;font-family:ui-monospace,monospace;font-size:.85rem}
</style>
</head>
<body>
  <h1>Sample Attendee Badges</h1>
  <p class="sub">Display these full-size and scan them — a phone's native camera reads the vCard, or use the app scanner.</p>
  <div class="row">
    <div class="card"><img src="badge-ada-lovelace.png" alt="Ada Lovelace badge"><p>Ada Lovelace<br><span class="email">ada@dayofdata.example</span></p></div>
    <div class="card"><img src="badge-grace-hopper.png" alt="Grace Hopper badge"><p>Grace Hopper<br><span class="email">grace@dayofdata.example</span></p></div>
    <div class="card"><img src="badge-alan-turing.png" alt="Alan Turing badge"><p>Alan Turing<br><span class="email">alan@dayofdata.example</span></p></div>
  </div>
</body>
</html>
